const DAYS = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
const DAY_COLORS = ["#22c55e","#3b82f6","#f59e0b","#a855f7","#ef4444","#06b6d4","#475569","#f97316","#ec4899"];

function getTodayName() {
  const d = new Date().getDay();
  return DAYS[d === 0 ? 6 : d - 1];
}
function todayISO() { return new Date().toISOString().slice(0, 10); }
function parseTime(t) {
  if (!t || !t.includes(":")) return 9999;
  const [m, s] = t.split(":");
  return parseInt(m) * 60 + parseInt(s || 0);
}
function fmtTime(s) {
  return s >= 9999 ? "--" : Math.floor(s/60) + ":" + String(s%60).padStart(2,"0");
}
function uid() { return Date.now() + Math.random(); }

function CheckIcon() {
  return <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>;
}
function PlusIcon() {
  return <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
}
function EditIcon() {
  return <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>;
}
function TrashIcon() {
  return <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>;
}
function UpIcon() {
  return <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><polyline points="18 15 12 9 6 15"/></svg>;
}
function DownIcon() {
  return <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><polyline points="6 9 12 15 18 9"/></svg>;
}

function RestTimer({ seconds, onClose }) {
  const [rem, setRem] = useState(seconds);
  const [paused, setPaused] = useState(false);
  useEffect(() => {
    if (paused || rem <= 0) return;
    const t = setTimeout(() => setRem(r => r - 1), 1000);
    return () => clearTimeout(t);
  }, [rem, paused]);
  const circ = 2 * Math.PI * 52;
  const col = rem <= 10 ? "#ef4444" : rem <= 30 ? "#f59e0b" : "#22c55e";
  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999,backdropFilter:"blur(6px)"}}>
      <div onClick={e => e.stopPropagation()} style={{background:"#0f172a",borderRadius:24,padding:"36px 44px",textAlign:"center",border:"1px solid #1f2937",minWidth:260}}>
        <div style={{fontSize:11,letterSpacing:3,color:"#4b5563",marginBottom:20,textTransform:"uppercase",fontFamily:"monospace"}}>Rest Timer</div>
        <div style={{position:"relative",width:130,height:130,margin:"0 auto 24px"}}>
          <svg width="130" height="130" style={{position:"absolute",inset:0,transform:"rotate(-90deg)"}}>
            <circle cx="65" cy="65" r="52" fill="none" stroke="#1f2937" strokeWidth="7"/>
            <circle cx="65" cy="65" r="52" fill="none" stroke={col} strokeWidth="7"
              strokeDasharray={circ} strokeDashoffset={circ * (rem / seconds)}
              strokeLinecap="round" style={{transition:"stroke-dashoffset 1s linear,stroke 0.3s"}}/>
          </svg>
          <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
            <div style={{fontSize:44,fontWeight:700,color:col,fontFamily:"monospace",lineHeight:1}}>{rem}</div>
            <div style={{fontSize:11,color:"#6b7280",marginTop:2}}>sec</div>
          </div>
        </div>
        {rem <= 0 && <div style={{fontSize:16,fontWeight:700,color:"#22c55e",marginBottom:12}}>Go! 💪</div>}
        <div style={{display:"flex",gap:10,justifyContent:"center"}}>
          <button onClick={() => setPaused(p => !p)} style={{padding:"9px 20px",borderRadius:10,border:"1px solid #374151",background:"#1f2937",color:"#d1d5db",cursor:"pointer",fontSize:13,fontFamily:"monospace"}}>
            {paused ? "Resume" : "Pause"}
          </button>
          <button onClick={onClose} style={{padding:"9px 20px",borderRadius:10,border:"none",background:col,color:"#000",cursor:"pointer",fontSize:13,fontWeight:700,fontFamily:"monospace"}}>Done</button>
        </div>
      </div>
    </div>
  );
}

function WeightChart({ history, color }) {
  if (!history || history.length < 2) return null;
  const vals = history.map(h => h.weight);
  const min = Math.min(...vals) - 5;
  const max = Math.max(...vals) + 5;
  const W = 300, H = 80;
  const pts = vals.map((v, i) => ({
    x: 20 + (i / (vals.length - 1)) * (W - 40),
    y: H - 14 - ((v - min) / (max - min)) * (H - 28)
  }));
  const pathD = pts.map((p, i) => (i === 0 ? "M" : "L") + p.x.toFixed(1) + "," + p.y.toFixed(1)).join(" ");
  const areaD = pathD + " L" + pts[pts.length-1].x.toFixed(1) + "," + (H-14) + " L" + pts[0].x.toFixed(1) + "," + (H-14) + " Z";
  const gain = vals[vals.length-1] - vals[0];
  return (
    <div style={{marginTop:8}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
        <span style={{fontSize:10,color:"#4b5563",fontFamily:"monospace"}}>{history[0].date.slice(5)} — {history[history.length-1].date.slice(5)}</span>
        <span style={{fontSize:11,fontWeight:700,fontFamily:"monospace",color:gain>0?"#22c55e":gain<0?"#ef4444":"#6b7280"}}>{gain > 0 ? "+" : ""}{gain} lbs</span>
      </div>
      <svg viewBox={"0 0 " + W + " " + H} style={{width:"100%",height:80}}>
        <defs>
          <linearGradient id={"area_" + color.replace("#","")} x1="0" x2="0" y1="0" y2="1">
            <stop offset="0%" stopColor={color} stopOpacity="0.25"/>
            <stop offset="100%" stopColor={color} stopOpacity="0.02"/>
          </linearGradient>
        </defs>
        <path d={areaD} fill={"url(#area_" + color.replace("#","") + ")"} />
        <path d={pathD} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
        {pts.map((p, i) => (
          <g key={i}>
            <circle cx={p.x} cy={p.y} r="3.5" fill="#030712" stroke={color} strokeWidth="2"/>
            <text x={p.x} y={H - 1} fill="#374151" fontSize="7" fontFamily="monospace" textAnchor="middle">{history[i].date.slice(5)}</text>
            <text x={p.x} y={p.y - 7} fill={color} fontSize="8" fontFamily="monospace" fontWeight="700" textAnchor="middle">{vals[i]}</text>
          </g>
        ))}
      </svg>
    </div>
  );
}


function TimedSetDisplay({ seconds, color, onDone }) {
  const [rem, setRem] = useState(seconds);
  const [running, setRunning] = useState(false);
  useEffect(() => {
    if (!running || rem <= 0) return;
    const t = setTimeout(() => setRem(r => r - 1), 1000);
    return () => clearTimeout(t);
  }, [running, rem]);
  useEffect(() => { if (rem <= 0) onDone(); }, [rem]);
  const circ = 2 * Math.PI * 70;
  const col = rem <= 5 ? "#ef4444" : rem <= seconds * 0.3 ? "#f59e0b" : color;
  return (
    <div onClick={e => e.stopPropagation()} style={{display:"flex",flexDirection:"column",alignItems:"center",marginBottom:24}}>
      <div style={{position:"relative",width:180,height:180,marginBottom:8}}>
        {/* Ring always visible */}
        <svg width="180" height="180" style={{position:"absolute",inset:0,transform:"rotate(-90deg)"}}>
          <circle cx="90" cy="90" r="70" fill="none" stroke="#0f172a" strokeWidth="10"/>
          <circle cx="90" cy="90" r="70" fill="none" stroke={col} strokeWidth="10"
            strokeDasharray={circ} strokeDashoffset={running ? circ*(rem/seconds) : 0}
            strokeLinecap="round" style={{transition:"stroke-dashoffset 1s linear,stroke 0.3s"}}/>
        </svg>
        {/* Center content */}
        <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
          {running ? (
            <>
              <div style={{fontSize:56,fontWeight:800,fontFamily:"monospace",color:col,lineHeight:1}}>{rem}</div>
              <button onClick={() => setRunning(false)}
                style={{marginTop:6,padding:"4px 12px",borderRadius:8,border:"1px solid #374151",background:"transparent",color:"#6b7280",cursor:"pointer",fontSize:11}}>
                pause
              </button>
            </>
          ) : (
            <button onClick={() => { setRem(seconds); setRunning(true); }}
              style={{width:80,height:80,borderRadius:99,border:"none",background:color,color:"#000",cursor:"pointer",fontSize:28,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center"}}>
              ▶
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

function WorkoutMode({ exercise, color, lastWeight, onComplete, onClose, onWeightSave }) {
  const totalSets = exercise.sets;
  const [setNum, setSetNum] = useState(0);
  const [phase, setPhase] = useState("ready");
  const [rem, setRem] = useState(exercise.rest);
  const [timerRunning, setTimerRunning] = useState(false);
  const [weight, setWeight] = useState(lastWeight ? String(lastWeight) : "");
  const [lastUsedWeight, setLastUsedWeight] = useState(lastWeight ? String(lastWeight) : "");
  const [showWeightInput, setShowWeightInput] = useState(false);

  useEffect(() => {
    if (!timerRunning || rem <= 0) return;
    const t = setTimeout(() => setRem(r => r - 1), 1000);
    return () => clearTimeout(t);
  }, [timerRunning, rem]);

  useEffect(() => {
    if (rem <= 0 && timerRunning) setTimerRunning(false);
  }, [rem, timerRunning]);

  function handleTap() {
    if (phase === "ready") {
      const w = weight || lastUsedWeight;
      if (w) { setLastUsedWeight(String(w)); onWeightSave(setNum, String(w)); }
      onComplete(setNum);
      if (setNum + 1 >= totalSets) {
        setPhase("done");
      } else {
        setPhase("resting");
        setRem(exercise.rest);
        setTimerRunning(true);
      }
    } else if (phase === "resting") {
      setTimerRunning(false);
      setSetNum(s => s + 1);
      setPhase("ready");
      setWeight(lastUsedWeight || (lastWeight ? String(lastWeight) : ""));
    }
  }

  function handleBack() {
    setTimerRunning(false);
    setSetNum(s => Math.max(0, s - 1));
    setPhase("ready");
    setWeight(lastUsedWeight || (lastWeight ? String(lastWeight) : ""));
  }

  const circ = 2 * Math.PI * 80;
  const restPct = rem / exercise.rest;
  const timerCol = rem <= 10 ? "#ef4444" : rem <= exercise.rest * 0.4 ? "#f59e0b" : "#22c55e";

  return (
    <div style={{position:"fixed",inset:0,background:"#030712",zIndex:200,display:"flex",flexDirection:"column",maxWidth:480,margin:"0 auto"}}>
      {/* Header */}
      <div style={{padding:"20px 20px 0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{fontSize:10,letterSpacing:3,color:color,fontFamily:"monospace",textTransform:"uppercase"}}>{exercise.equipment}</div>
          <div style={{fontSize:18,fontWeight:800,letterSpacing:-0.3,marginTop:2}}>{exercise.name}</div>
        </div>
        <button onClick={onClose} style={{padding:"8px 14px",borderRadius:10,border:"1px solid #1f2937",background:"#0f172a",color:"#6b7280",cursor:"pointer",fontSize:12,fontFamily:"monospace"}}>Exit</button>
      </div>

      {/* Set dots */}
      <div style={{display:"flex",gap:8,padding:"16px 20px 0",justifyContent:"center"}}>
        {Array.from({length:totalSets}).map((_,i) => (
          <div key={i} style={{width:i===setNum&&phase!=="done"?28:10,height:10,borderRadius:99,background:i<setNum||(i===setNum&&phase==="done")?color:i===setNum?"#1f2937":"#0f172a",border:"2px solid "+(i<=setNum?color:"#1f2937"),transition:"all 0.3s"}}/>
        ))}
      </div>

      {/* Main content area */}
      <div style={{flex:1,position:"relative",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",userSelect:"none",padding:"0 24px"}}>

        {/* Snapchat zones: left 1/3 = back, right 2/3 = forward — only during rest */}
        {phase === "resting" && (
          <>
            <div onClick={handleBack} style={{position:"absolute",left:0,top:0,width:"33%",height:"100%",zIndex:5,cursor:"pointer"}}/>
            <div onClick={handleTap} style={{position:"absolute",right:0,top:0,width:"67%",height:"100%",zIndex:5,cursor:"pointer"}}/>
          </>
        )}

        {/* Tap whole screen during ready phase */}
        {phase === "ready" && (
          <div onClick={handleTap} style={{position:"absolute",inset:0,zIndex:5,cursor:"pointer"}}/>
        )}

        {/* READY */}
        {phase === "ready" && (
          <>
            <div style={{fontSize:13,letterSpacing:3,color:"#4b5563",fontFamily:"monospace",textTransform:"uppercase",marginBottom:16}}>
              Set {setNum + 1} of {totalSets}
            </div>
            {exercise.timed ? (
              <TimedSetDisplay seconds={exercise.duration||30} color={color} onDone={() => handleTap()}/>
            ) : (
              <>
                <div style={{fontSize:72,fontWeight:800,fontFamily:"monospace",color:color,lineHeight:1,marginBottom:8}}>{exercise.reps}</div>
                <div style={{fontSize:14,color:"#6b7280",marginBottom:32}}>reps</div>
              </>
            )}
            {!exercise.timed && (weight ? (
              <div onClick={e => { e.stopPropagation(); setShowWeightInput(true); }} style={{background:color+"18",border:"1px solid "+color+"40",borderRadius:12,padding:"10px 20px",fontSize:22,fontWeight:800,fontFamily:"monospace",color:color,cursor:"pointer",marginBottom:24}}>
                {weight} lbs
              </div>
            ) : (
              <button onClick={e => { e.stopPropagation(); setShowWeightInput(true); }} style={{background:"#0f172a",border:"2px dashed #374151",borderRadius:12,padding:"10px 20px",fontSize:13,color:"#4b5563",cursor:"pointer",marginBottom:24,fontFamily:"monospace"}}>
                + Set weight
              </button>
            ))}
            {!exercise.timed && (
              <>
                <div style={{fontSize:13,color:"#374151",letterSpacing:1}}>TAP ANYWHERE WHEN DONE</div>
                <div style={{marginTop:12,fontSize:32,animation:"pulse 1.5s ease-in-out infinite"}}>👇</div>
              </>
            )}
          </>
        )}

        {/* RESTING */}
        {phase === "resting" && (
          <>
            <div style={{fontSize:13,letterSpacing:3,color:"#4b5563",fontFamily:"monospace",textTransform:"uppercase",marginBottom:24}}>
              Rest — Set {setNum + 1} done
            </div>
            <div style={{position:"relative",width:200,height:200,marginBottom:24}}>
              <svg width="200" height="200" style={{position:"absolute",inset:0,transform:"rotate(-90deg)"}}>
                <circle cx="100" cy="100" r="80" fill="none" stroke="#0f172a" strokeWidth="10"/>
                <circle cx="100" cy="100" r="80" fill="none" stroke={timerCol} strokeWidth="10"
                  strokeDasharray={circ} strokeDashoffset={circ*(1-restPct)}
                  strokeLinecap="round" style={{transition:"stroke-dashoffset 1s linear,stroke 0.3s"}}/>
              </svg>
              <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
                <div style={{fontSize:64,fontWeight:800,fontFamily:"monospace",color:timerCol,lineHeight:1}}>{rem}</div>
                <div style={{fontSize:12,color:"#4b5563",marginTop:4}}>seconds</div>
              </div>
            </div>
            <div style={{fontSize:13,color:rem<=0?"#22c55e":"#374151",letterSpacing:1,fontWeight:rem<=0?700:400}}>
              {rem <= 0 ? "TAP RIGHT TO START NEXT SET 💪" : "← BACK  |  SKIP →"}
            </div>
          </>
        )}

        {/* DONE */}
        {phase === "done" && (
          <>
            <div style={{fontSize:64,marginBottom:16}}>🎉</div>
            <div style={{fontSize:28,fontWeight:800,color:color,marginBottom:8,letterSpacing:-0.5}}>Exercise Done!</div>
            <div style={{fontSize:14,color:"#6b7280",marginBottom:32}}>{totalSets} sets complete</div>
            <button onClick={onClose} style={{padding:"14px 36px",borderRadius:14,border:"none",background:color,color:"#000",cursor:"pointer",fontSize:16,fontWeight:800}}>
              Back to Workout
            </button>
          </>
        )}

      </div>

      {/* Weight input sheet */}
      {showWeightInput && (
        <div onClick={() => setShowWeightInput(false)} style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.8)",display:"flex",alignItems:"flex-end",zIndex:10}}>
          <div onClick={e => e.stopPropagation()} style={{width:"100%",background:"#0f172a",borderRadius:"20px 20px 0 0",padding:"24px 20px 40px",border:"1px solid #1f2937"}}>
            <div style={{fontSize:11,letterSpacing:3,color:color,fontFamily:"monospace",textTransform:"uppercase",marginBottom:12}}>Weight for set {setNum+1}</div>
            <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:16}}>
              <input type="number" placeholder={lastWeight||"0"} value={weight} autoFocus
                onChange={e => setWeight(e.target.value)}
                style={{flex:1,background:"#030712",border:"2px solid "+color,borderRadius:12,padding:"14px 16px",color:color,fontSize:32,fontWeight:800,fontFamily:"monospace",outline:"none",boxSizing:"border-box"}}/>
              <span style={{fontSize:16,color:"#4b5563"}}>lbs</span>
            </div>
            <div style={{display:"flex",gap:8,marginBottom:16}}>
              {[-5,-2.5,+2.5,+5].map(d => (
                <button key={d} onClick={() => setWeight(w => String((parseFloat(w||lastWeight||0)+d).toFixed(1)))}
                  style={{flex:1,padding:"10px 0",borderRadius:10,border:"1px solid #1f2937",background:"#030712",color:d>0?"#22c55e":"#ef4444",cursor:"pointer",fontSize:13,fontWeight:700,fontFamily:"monospace"}}>
                  {d>0?"+":""}{d}
                </button>
              ))}
            </div>
            <button onClick={() => setShowWeightInput(false)} style={{width:"100%",padding:"14px",borderRadius:12,border:"none",background:color,color:"#000",cursor:"pointer",fontSize:15,fontWeight:800}}>
              Confirm
            </button>
          </div>
        </div>
      )}

      <style>{`@keyframes pulse { 0%,100%{opacity:1;transform:translateY(0)} 50%{opacity:0.4;transform:translateY(6px)} }`}</style>
    </div>
  );
}


// ── EDIT DAY SCREEN ───────────────────────────────────────────────────────────
function EditDayScreen({ day, program, onSave, onClose }) {
  const orig = program[day];
  const [label, setLabel] = useState(orig.label);
  const [subtitle, setSubtitle] = useState(orig.subtitle);
  const [color, setColor] = useState(orig.color);
  const [type, setType] = useState(orig.type);
  const [exercises, setExercises] = useState(orig.exercises.map(e => ({...e})));
  const [cardio, setCardio] = useState(orig.cardio ? {...orig.cardio} : null);
  const [editingEx, setEditingEx] = useState(null); // index or "new"
  const [newEx, setNewEx] = useState({ name:"", equipment:"", sets:"3", reps:"10-12", rest:"60", timed:false, duration:"30" });
  const [editExData, setEditExData] = useState({});

  const iStyle = { width:"100%", background:"#030712", border:"1px solid #374151", borderRadius:8, padding:"8px 10px", color:"#f9fafb", fontSize:13, fontFamily:"monospace", boxSizing:"border-box", marginTop:4 };

  function saveEx() {
    if (editingEx === "new") {
      if (!newEx.name.trim()) return;
      setExercises(prev => [...prev, { ...newEx, sets: parseInt(newEx.sets)||3, rest: parseInt(newEx.rest)||60, id: uid() }]);
      setNewEx({ name:"", equipment:"", sets:"3", reps:"10-12", rest:"60", timed:false, duration:"30" });
    } else {
      setExercises(prev => prev.map((e,i) => i === editingEx ? { ...e, ...editExData, sets: parseInt(editExData.sets)||e.sets, rest: parseInt(editExData.rest)||e.rest, duration: editExData.duration ? parseInt(editExData.duration) : e.duration } : e));
    }
    setEditingEx(null);
  }

  function moveEx(i, dir) {
    setExercises(prev => {
      const arr = [...prev];
      const j = i + dir;
      if (j < 0 || j >= arr.length) return arr;
      [arr[i], arr[j]] = [arr[j], arr[i]];
      return arr;

  function handleSave() {
    onSave(day, { ...orig, label, subtitle, color, type, exercises, cardio });

        </div>

          <button onClick={handleSave} style={{padding:"8px 16px",borderRadius:10,border:"none",background:color,color:"#000",cursor:"pointer",fontSize:12,fontWeight:700}}>Save</button>

      <div style={{padding:"16px"}}>
        {/* Day info */}
        <div style={{background:"#0a0f1a",borderRadius:14,padding:"14px",marginBottom:12,border:"1px solid #1f2937"}}>

                  <div key={k} style={{marginBottom:6}}>

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState("today");
  const [selDay, setSelDay] = useState(getTodayName);
  const [timer, setTimer] = useState(null);
  const [activeWorkout, setActiveWorkout] = useState(null);
  const [editingDay, setEditingDay] = useState(null);

  function load(key, fallback) {
    try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch { return fallback; }
  }

  // Program is now persisted state
  const [program, setProgramRaw] = useState(() => load("dht_program", DEFAULT_PROGRAM));
  function setProgram(fn) {
    setProgramRaw(prev => {
      const next = typeof fn === "function" ? fn(prev) : fn;
      try { localStorage.setItem("dht_program", JSON.stringify(next)); } catch {}
      return next;
    });
  }

  function updateDay(day, data) {
    setProgram(prev => ({ ...prev, [day]: data }));
  }

  const [workoutLogs, setWorkoutLogsRaw] = useState(() => load("dht_workoutLogs", {}));
  function setWorkoutLogs(fn) {
    setWorkoutLogsRaw(prev => {
      const next = typeof fn === "function" ? fn(prev) : fn;
      try { localStorage.setItem("dht_workoutLogs", JSON.stringify(next)); } catch {}
      return next;
    });
  }

  const [weightHistory, setWeightHistoryRaw] = useState(() => load("dht_weightHistory", {}));
  function setWeightHistory(fn) {
    setWeightHistoryRaw(prev => {
      const next = typeof fn === "function" ? fn(prev) : fn;
      try { localStorage.setItem("dht_weightHistory", JSON.stringify(next)); } catch {}
      return next;
    });
  }

  const [mileLog, setMileLogRaw] = useState(() => load("dht_mileLog", []));
  function setMileLog(fn) {
    setMileLogRaw(prev => {
      const next = typeof fn === "function" ? fn(prev) : fn;
      try { localStorage.setItem("dht_mileLog", JSON.stringify(next)); } catch {}
      return next;
    });
  }

  const [weightOpen, setWeightOpen] = useState(null);
  const [selExercise, setSelExercise] = useState("");
  const [showMileForm, setShowMileForm] = useState(false);
  const [mileInput, setMileInput] = useState({ date: todayISO(), time: "", notes: "" });

  const today = getTodayName();
  const prog = program[selDay];
  const log = workoutLogs[selDay] || {};

  // Build flat exercise list for progress tab from current program
  const ALL_EXERCISES = [];
  DAYS.forEach(day => {
    program[day].exercises.forEach(ex => {
      if (!ALL_EXERCISES.find(e => e.name === ex.name)) {
        ALL_EXERCISES.push({ name: ex.name, day, color: program[day].color });
      }
    });
  });

  useEffect(() => {
    if (!selExercise && ALL_EXERCISES.length > 0) setSelExercise(ALL_EXERCISES[0].name);
  }, []);

  function updateLog(day, updates) {
    setWorkoutLogs(prev => ({ ...prev, [day]: { ...(prev[day] || {}), ...updates } }));
  }
  function toggleSet(exId, setIdx) {
    updateLog(selDay, { ["s_"+exId+"_"+setIdx]: !log["s_"+exId+"_"+setIdx] });
  }
  function setWeight(exId, exName, setIdx, val) {
    updateLog(selDay, { ["w_"+exId+"_"+setIdx]: val });
    const numVal = parseFloat(val);
    if (!isNaN(numVal) && numVal > 0) {
      setWeightHistory(prev => {
        const hist = prev[exName] || [];
        const dateStr = todayISO();
        const existing = hist.find(h => h.date === dateStr);
        let updated;
        if (existing) {
          updated = hist.map(h => h.date === dateStr ? { ...h, weight: Math.max(h.weight, numVal) } : h);
        } else {
          updated = [...hist, { date: dateStr, weight: numVal }].sort((a,b) => a.date.localeCompare(b.date));
        }
        return { ...prev, [exName]: updated };
      });
    }
  }
  function toggleCardio() { updateLog(selDay, { cardio: !log.cardio }); }
  function toggleDayDone() { updateLog(selDay, { done: !log.done }); }

  function setsProgress(day) {
    const p = program[day];
    const l = workoutLogs[day] || {};
    let done = 0, total = 0;
    p.exercises.forEach(ex => {
      for (let s = 0; s < ex.sets; s++) {
        total++;
        if (l["s_"+ex.id+"_"+s]) done++;
      }
    });
    return { done, total };
  }

  function weekDone() {
    return DAYS.filter(d => program[d].type !== "rest" && (workoutLogs[d] || {}).done).length;
  }
  const totalWorkoutDays = DAYS.filter(d => program[d].type !== "rest").length;

  function addMile() {
    if (!mileInput.time) return;
    setMileLog(prev => [...prev, { ...mileInput, id: Date.now() }].sort((a,b) => a.date.localeCompare(b.date)));
    setMileInput({ date: todayISO(), time: "", notes: "" });
    setShowMileForm(false);
  }

  const inputStyle = { width:"100%", background:"#030712", border:"1px solid #1f2937", borderRadius:9, padding:"9px 12px", color:"#f9fafb", fontSize:14, fontFamily:"monospace", boxSizing:"border-box" };
  const TABS = [["today","💪","Today"],["week","📅","Week"],["progress","📈","Progress"],["mile","🏃","Mile"],["edit","⚙️","Edit"]];

  return (
    <div style={{minHeight:"100vh",background:"#030712",color:"#f9fafb",fontFamily:"system-ui,sans-serif",maxWidth:480,margin:"0 auto",paddingBottom:72}}>
      {timer && <RestTimer seconds={timer} onClose={() => setTimer(null)}/>}

      {editingDay && (
        <EditDayScreen
          day={editingDay}
          program={program}
          onSave={updateDay}
          onClose={() => setEditingDay(null)}
        />
      )}

      {activeWorkout && (() => {
        const { exId } = activeWorkout;
        const ex = prog.exercises.find(e => e.id === exId);

        const hist = weightHistory[ex.name] || [];
        const prevEntries = hist.filter(h => h.date < todayISO());
        const lastW = prevEntries.length ? prevEntries[prevEntries.length-1].weight : null;
        return (
          <WorkoutMode
            exercise={ex}
            color={prog.color}
            lastWeight={lastW}
            onComplete={(si) => toggleSet(ex.id, si)}
            onWeightSave={(si, val) => setWeight(ex.id, ex.name, si, val)}
            onClose={() => setActiveWorkout(null)}
          />
        );
      })()}

      {/* HEADER */}

          <div>
            <div style={{fontSize:10,letterSpacing:4,color:"#374151",textTransform:"uppercase",fontFamily:"monospace"}}>Dean's</div>
            <div style={{fontSize:22,fontWeight:800,letterSpacing:-0.5}}>Training HQ</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:11,color:"#374151",fontFamily:"monospace"}}>{new Date().toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"})}</div>
            <div style={{display:"flex",alignItems:"center",gap:6,justifyContent:"flex-end",marginTop:4}}>
              <div style={{width:56,height:5,borderRadius:99,background:"#1f2937",overflow:"hidden"}}>
                <div style={{width:((weekDone()/totalWorkoutDays)*100)+"%",height:"100%",background:"#22c55e",borderRadius:99,transition:"width 0.4s"}}/>
              </div>
              <span style={{fontSize:10,color:"#6b7280",fontFamily:"monospace"}}>{weekDone()}/{totalWorkoutDays}</span>
            </div>
          </div>
        </div>
        <div style={{display:"flex",borderBottom:"1px solid #1f2937"}}>
          {TABS.map(([k,,l]) => (
            <button key={k} onClick={() => setTab(k)} style={{flex:1,padding:"9px 0",border:"none",background:"none",color:tab===k?"#f9fafb":"#4b5563",fontSize:11,fontWeight:tab===k?700:400,cursor:"pointer",borderBottom:"2px solid "+(tab===k?"#22c55e":"transparent"),transition:"all 0.2s"}}>
              {l}
            </button>
          ))}
        </div>
      </div>

      {/* TODAY TAB */}
      {tab === "today" && (
        <div>
          <div style={{display:"flex",gap:6,padding:"14px 16px",overflowX:"auto",scrollbarWidth:"none"}}>
            {DAYS.map(d => {
              const p = program[d];
              const isSel = d === selDay;
              const sp = setsProgress(d);
              return (
                <button key={d} onClick={() => { setSelDay(d); setWeightOpen(null); }} style={{flexShrink:0,borderRadius:12,border:"2px solid "+(isSel?p.color:"#1f2937"),background:isSel?(p.color+"15"):"#0a0f1a",padding:"8px 12px",cursor:"pointer",minWidth:64,textAlign:"center",transition:"all 0.2s"}}>
                  <div style={{fontSize:10,fontWeight:700,color:isSel?p.color:"#4b5563",fontFamily:"monospace",letterSpacing:1}}>{d===today?"* ":""}{d.slice(0,3).toUpperCase()}</div>
                  <div style={{fontSize:10,color:isSel?"#e5e7eb":"#374151",marginTop:2}}>{p.label.split(" ")[0]}</div>
                  {p.type !== "rest" && sp.total > 0 && (
                    <div style={{marginTop:5,height:3,borderRadius:99,background:"#1f2937",overflow:"hidden"}}>
                      <div style={{width:((sp.done/sp.total)*100)+"%",height:"100%",background:p.color,borderRadius:99}}/>
                    </div>
                  )}
                </button>
              );
            })}
          </div>

          <div style={{margin:"0 16px 16px"}}>
            <div style={{background:"#0a0f1a",borderRadius:16,padding:"18px",border:"1px solid "+(prog.color+"25")}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div>
                  <div style={{fontSize:10,letterSpacing:3,color:prog.color,fontFamily:"monospace",textTransform:"uppercase",marginBottom:4}}>{selDay}</div>
                  <div style={{fontSize:22,fontWeight:800,letterSpacing:-0.5,lineHeight:1}}>{prog.label}</div>
                  <div style={{fontSize:12,color:"#6b7280",marginTop:3}}>{prog.subtitle}</div>
                </div>
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  {prog.type !== "rest" && (
                    <button onClick={toggleDayDone} style={{width:44,height:44,borderRadius:12,border:"2px solid "+(log.done?prog.color:"#1f2937"),background:log.done?prog.color:"#0f172a",color:log.done?"#000":"#374151",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.2s"}}>
                      <CheckIcon/>
                    </button>
                  )}
                </div>
              </div>
            </div>
          </div>

          {prog.type === "rest" ? (
            <div style={{textAlign:"center",padding:"48px 16px"}}>
              <div style={{fontSize:52,marginBottom:12}}>😴</div>
              <div style={{fontSize:18,fontWeight:700,marginBottom:6}}>Rest Day</div>
              <div style={{fontSize:13,color:"#4b5563"}}>This is where the gains actually happen.</div>
            </div>
          ) : (
            <div>
              <div style={{padding:"0 16px"}}>
                <div style={{fontSize:10,letterSpacing:3,color:"#374151",textTransform:"uppercase",fontFamily:"monospace",marginBottom:10}}>Exercises</div>
                <div style={{display:"flex",flexDirection:"column",gap:10}}>
                  {prog.exercises.map((ex) => {
                    const setsDone = Array.from({length:ex.sets}).filter((_,si) => log["s_"+ex.id+"_"+si]).length;
                    const weights = Array.from({length:ex.sets}).map((_,si) => parseFloat(log["w_"+ex.id+"_"+si]||"0")).filter(w=>w>0);
                    const maxW = weights.length ? Math.max(...weights) : null;
                    const hist = weightHistory[ex.name] || [];
                    const prevEntries = hist.filter(h => h.date < todayISO());
                    const lastW = prevEntries.length ? prevEntries[prevEntries.length-1].weight : null;
                    return (
                      <div key={ex.id} style={{background:"#0a0f1a",borderRadius:14,padding:"14px",border:"1px solid #1f2937"}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                          <div style={{flex:1,paddingRight:8}}>
                            <div style={{fontSize:14,fontWeight:600,marginBottom:2}}>{ex.name}</div>
                            <div style={{fontSize:11,color:"#4b5563"}}>{ex.equipment} · {ex.timed ? (ex.duration||30)+"s hold" : ex.reps+" reps"}</div>
                          </div>
                          <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:2}}>
                            <div style={{fontSize:11,color:setsDone===ex.sets?prog.color:"#4b5563",fontFamily:"monospace",fontWeight:700}}>{setsDone}/{ex.sets}</div>
                            {lastW && <div style={{fontSize:10,color:"#374151",fontFamily:"monospace"}}>last: {lastW}lb</div>}
                            <button onClick={() => setActiveWorkout({ exId: ex.id })}
                              style={{marginTop:4,padding:"4px 10px",borderRadius:8,border:"none",background:prog.color,color:"#000",cursor:"pointer",fontSize:11,fontWeight:800,fontFamily:"monospace"}}>
                              ▶ START
                            </button>
                          </div>
                        </div>
                        <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
                          {Array.from({length:ex.sets}).map((_,si) => {
                            const done = log["s_"+ex.id+"_"+si];
                            const w = log["w_"+ex.id+"_"+si] || "";
                            const prevSetW = !w ? Array.from({length:si}).map((_,i) => log["w_"+ex.id+"_"+(si-1-i)]).find(v => v) : null;
                            const suggestedW = !w ? (prevSetW || (lastW ? String(lastW) : "")) : "";
                            const displayW = w || suggestedW;
                            const isSuggested = !w && !!suggestedW;
                            const isOpen = weightOpen === ex.id+"_"+si;
                            return (
                              <div key={si} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                                <button onClick={() => toggleSet(ex.id, si)} style={{width:42,height:42,borderRadius:11,border:"2px solid "+(done?prog.color:"#1f2937"),background:done?prog.color:"#030712",color:done?"#000":"#4b5563",cursor:"pointer",fontSize:13,fontWeight:700,fontFamily:"monospace",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.15s"}}>
                                  {done ? <CheckIcon/> : si+1}
                                </button>
                                <button onClick={() => setWeightOpen(isOpen ? null : ex.id+"_"+si)} style={{fontSize:9,fontFamily:"monospace",color:w?prog.color:isSuggested?"#9ca3af":"#374151",background:w?(prog.color+"18"):isSuggested?"#1f293780":"#0a0f1a",border:"1px solid "+(w?(prog.color+"40"):isSuggested?"#37415180":"#1f2937"),borderRadius:6,padding:"2px 5px",cursor:"pointer",minWidth:36,textAlign:"center"}}>
                                  {displayW ? displayW+"lb" : "+wt"}
                                </button>
                              </div>
                            );
                          })}
                          <button onClick={() => setTimer(ex.rest)} style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:4,padding:"7px 10px",borderRadius:9,border:"1px solid #1f2937",background:"transparent",color:"#4b5563",cursor:"pointer",fontSize:11,fontFamily:"monospace"}}>
                            ⏱ {ex.rest}s
                          </button>
                        </div>
                        {weightOpen && String(weightOpen).startsWith(ex.id+"_") && (() => {
                          const si = parseInt(String(weightOpen).split("_")[1]);
                          const wKey = "w_"+ex.id+"_"+si;
                          return (
                            <div style={{marginTop:10,padding:"10px 12px",background:"#030712",borderRadius:10,border:"1px solid "+prog.color+"30",display:"flex",alignItems:"center",gap:10}}>
                              <span style={{fontSize:11,color:"#4b5563",fontFamily:"monospace",flexShrink:0}}>Set {si+1}:</span>
                              <input type="number" placeholder={lastW ? String(lastW) : "lbs"} value={log[wKey] || ""}
                                onChange={e => setWeight(ex.id, ex.name, si, e.target.value)}
                                style={{flex:1,background:"transparent",border:"none",color:prog.color,fontSize:18,fontWeight:700,fontFamily:"monospace",outline:"none",width:0}} autoFocus/>
                              <span style={{fontSize:12,color:"#4b5563"}}>lbs</span>
                              {lastW && !log[wKey] && (
                                <button onClick={() => { setWeight(ex.id, ex.name, si, String(lastW)); setWeightOpen(null); }} style={{padding:"4px 8px",borderRadius:7,border:"1px solid #374151",background:"#1f2937",color:"#9ca3af",cursor:"pointer",fontSize:11,fontFamily:"monospace",flexShrink:0}}>={lastW}</button>
                              )}
                              <button onClick={() => setWeightOpen(null)} style={{padding:"4px 10px",borderRadius:7,border:"none",background:prog.color,color:"#000",cursor:"pointer",fontSize:12,fontWeight:700,flexShrink:0}}>OK</button>
                            </div>
                          );
                        })()}
                        {maxW && lastW && (
                          <div style={{marginTop:8,fontSize:10,fontFamily:"monospace",color:maxW>lastW?"#22c55e":maxW<lastW?"#ef4444":"#6b7280",textAlign:"right"}}>
                            {maxW > lastW ? "▲ +" + (maxW-lastW) + "lb PR today!" : maxW < lastW ? "▼ " + (maxW-lastW) + "lb vs last" : "= same as last time"}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>

              {prog.cardio && (
                <div style={{padding:"16px 16px 0"}}>
                  <div style={{fontSize:10,letterSpacing:3,color:"#374151",textTransform:"uppercase",fontFamily:"monospace",marginBottom:10}}>Cardio</div>
                  <div style={{background:"#060d1f",borderRadius:14,padding:"14px",border:"1px solid #1e3a5f"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                      <div style={{flex:1}}>
                        <div style={{fontSize:14,fontWeight:600,color:"#60a5fa",marginBottom:3}}>{prog.cardio.type}</div>
                        <div style={{fontSize:12,color:"#6b7280",marginBottom:8}}>{prog.cardio.detail}</div>
                        <div style={{display:"flex",gap:12}}>
                          <span style={{fontSize:11,color:"#374151",fontFamily:"monospace"}}>⏱ {prog.cardio.duration}</span>
                          <span style={{fontSize:11,color:"#374151",fontFamily:"monospace"}}>RPE {prog.cardio.rpe}/10</span>
                        </div>
                      </div>
                      <button onClick={toggleCardio} style={{width:42,height:42,borderRadius:11,border:"2px solid "+(log.cardio?"#3b82f6":"#1e3a5f"),background:log.cardio?"#3b82f6":"#060d1f",color:log.cardio?"#fff":"#374151",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.2s",flexShrink:0,marginLeft:12}}>
                        <CheckIcon/>
                      </button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          )}
        </div>
      )}

      {/* WEEK TAB */}
      {tab === "week" && (
        <div style={{padding:"20px 16px"}}>
          <div style={{background:"#0a0f1a",borderRadius:16,padding:"16px",marginBottom:20,border:"1px solid #1f2937",display:"flex",alignItems:"center",gap:16}}>
            <div style={{flex:1}}>
              <div style={{fontSize:10,color:"#374151",fontFamily:"monospace",textTransform:"uppercase",letterSpacing:2,marginBottom:6}}>This Week</div>
              <div style={{height:8,borderRadius:99,background:"#1f2937",overflow:"hidden"}}>
                <div style={{width:((weekDone()/totalWorkoutDays)*100)+"%",height:"100%",background:"#22c55e",borderRadius:99,transition:"width 0.5s"}}/>
              </div>
            </div>
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:32,fontWeight:800,fontFamily:"monospace",color:"#22c55e",lineHeight:1}}>{weekDone()}</div>
              <div style={{fontSize:10,color:"#4b5563",marginTop:2}}>/ {totalWorkoutDays} days</div>
            </div>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {DAYS.map(d => {
              const p = program[d];
              const l = workoutLogs[d] || {};
              const sp = setsProgress(d);
              const isToday = d === today;
              return (
                <div key={d} onClick={() => { setSelDay(d); setTab("today"); }} style={{background:"#0a0f1a",borderRadius:14,padding:"14px 16px",border:"1px solid "+(isToday?(p.color+"40"):"#1f2937"),display:"flex",alignItems:"center",gap:12,cursor:"pointer"}}>
                  <div style={{width:42,height:42,borderRadius:11,background:p.color+"18",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:p.color,fontFamily:"monospace",flexShrink:0}}>{d.slice(0,3).toUpperCase()}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <span style={{fontSize:14,fontWeight:600}}>{p.label}</span>
                      <span style={{fontSize:10,fontFamily:"monospace",color:l.done?p.color:isToday?"#f59e0b":"#374151"}}>{l.done?"DONE":isToday?"TODAY":""}</span>
                    </div>
                    {p.type !== "rest" && sp.total > 0 && (
                      <div>
                        <div style={{height:3,borderRadius:99,background:"#1f2937",overflow:"hidden",marginTop:6}}>
                          <div style={{width:((sp.done/sp.total)*100)+"%",height:"100%",background:p.color,borderRadius:99}}/>
                        </div>
                        <div style={{fontSize:10,color:"#374151",marginTop:3,fontFamily:"monospace"}}>{sp.done}/{sp.total} sets</div>
                      </div>
                    )}
                    {p.type === "rest" && <div style={{fontSize:11,color:"#374151",marginTop:2}}>Recovery day</div>}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* PROGRESS TAB */}
      {tab === "progress" && (
        <div style={{padding:"20px 16px"}}>
          <div style={{fontSize:10,letterSpacing:3,color:"#374151",textTransform:"uppercase",fontFamily:"monospace",marginBottom:12}}>Exercise Progress</div>
          <div style={{display:"flex",gap:6,overflowX:"auto",scrollbarWidth:"none",marginBottom:16,paddingBottom:4}}>

              <button key={ex.name} onClick={() => setSelExercise(ex.name)} style={{flexShrink:0,padding:"7px 12px",borderRadius:20,border:"2px solid "+(selExercise===ex.name?ex.color:"#1f2937"),background:selExercise===ex.name?(ex.color+"18"):"#0a0f1a",color:selExercise===ex.name?ex.color:"#4b5563",cursor:"pointer",fontSize:11,fontWeight:selExercise===ex.name?700:400,whiteSpace:"nowrap"}}>
                {ex.name.split(" ").slice(0,2).join(" ")}
              </button>

          </div>
          {(() => {
            const exMeta = ALL_EXERCISES.find(e => e.name === selExercise);
            const hist = weightHistory[selExercise] || [];

            return (
              <div style={{background:"#0a0f1a",borderRadius:16,padding:"18px",border:"1px solid "+(color+"30")}}>
                <div style={{fontSize:10,letterSpacing:2,color:color,fontFamily:"monospace",textTransform:"uppercase",marginBottom:4}}>{exMeta?.day}</div>
                <div style={{fontSize:18,fontWeight:700,marginBottom:2}}>{selExercise || "Select an exercise"}</div>
                {hist.length === 0 ? (
                  <div style={{textAlign:"center",padding:"32px 0",color:"#374151"}}>
                    <div style={{fontSize:32,marginBottom:8}}>🏋️</div>
                    <div style={{fontSize:13}}>No weight logged yet.</div>
                  </div>
                ) : (
                  <div>
                    <div style={{display:"flex",gap:8,marginTop:12,marginBottom:4}}>
                      {[["Best", Math.max(...hist.map(h=>h.weight)) + " lbs", color],["Last", hist[hist.length-1].weight + " lbs", "#94a3b8"],["Sessions", hist.length, "#6b7280"]].map(([label, val, c]) => (
                        <div key={label} style={{flex:1,background:"#030712",borderRadius:10,padding:"10px 8px",textAlign:"center",border:"1px solid #1f2937"}}>
                          <div style={{fontSize:16,fontWeight:800,fontFamily:"monospace",color:c}}>{val}</div>
                          <div style={{fontSize:9,color:"#374151",marginTop:2,textTransform:"uppercase",letterSpacing:1}}>{label}</div>
                        </div>
                      ))}
                    </div>
                    {hist.length >= 2 ? <WeightChart history={hist} color={color}/> : <div style={{textAlign:"center",padding:"16px 0",fontSize:12,color:"#374151"}}>Log 2+ sessions to see chart.</div>}
                    <div style={{marginTop:14}}>
                      <div style={{fontSize:10,letterSpacing:2,color:"#374151",fontFamily:"monospace",textTransform:"uppercase",marginBottom:8}}>History</div>
                      <div style={{display:"flex",flexDirection:"column",gap:6}}>
                        {[...hist].reverse().map((h, i, arr) => {
                          const prev = arr[i+1];
                          const diff = prev ? h.weight - prev.weight : null;
                          return (
                            <div key={h.date} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"9px 12px",background:"#030712",borderRadius:10,border:"1px solid #1f2937"}}>

                              <div style={{display:"flex",alignItems:"center",gap:10}}>
                                {diff !== null && <span style={{fontSize:10,fontFamily:"monospace",color:diff>0?"#22c55e":diff<0?"#ef4444":"#374151"}}>{diff>0?"+":""}{diff} lb</span>}
                                <span style={{fontSize:15,fontWeight:700,fontFamily:"monospace",color:color}}>{h.weight} lbs</span>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  </div>
                )}
              </div>
            );
          })()}
        </div>
      )}

      {/* MILE TAB */}
      {tab === "mile" && (
        <div style={{padding:"20px 16px"}}>
          <div style={{background:"linear-gradient(135deg,#0c1a2e,#060d1f)",borderRadius:18,padding:"20px",marginBottom:16,border:"1px solid #1e3a5f",position:"relative",overflow:"hidden"}}>
            <div style={{position:"absolute",right:16,top:8,fontSize:64,opacity:0.06,userSelect:"none"}}>🏃</div>
            <div style={{fontSize:10,letterSpacing:3,color:"#3b82f6",fontFamily:"monospace",textTransform:"uppercase",marginBottom:4}}>2025 Goal</div>
            <div style={{fontSize:40,fontWeight:800,fontFamily:"monospace",color:"#93c5fd",letterSpacing:-1}}>5:59</div>
            <div style={{fontSize:12,color:"#4b7099",marginTop:2}}>Sub-6:00 Mile</div>
            {mileLog.length > 0 && (() => {
              const best = Math.min(...mileLog.map(m => parseTime(m.time)));
              const diff = best - 360;
              const pct = Math.min(100, Math.max(0, 100 - diff * 2));
              return (
                <div style={{marginTop:14}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                    <span style={{fontSize:10,color:"#374151",fontFamily:"monospace"}}>Best: {fmtTime(best)}</span>
                    <span style={{fontSize:10,color:diff<=0?"#22c55e":"#3b82f6",fontFamily:"monospace"}}>{diff<=0?"GOAL MET!":(fmtTime(Math.abs(diff))+" to go")}</span>
                  </div>
                  <div style={{height:6,borderRadius:99,background:"#0f172a",overflow:"hidden"}}>
                    <div style={{width:pct+"%",height:"100%",background:"linear-gradient(90deg,#3b82f6,#22c55e)",borderRadius:99,transition:"width 0.5s"}}/>
                  </div>
                </div>
              );
            })()}
          </div>
          <button onClick={() => setShowMileForm(f => !f)} style={{width:"100%",padding:"13px",borderRadius:13,border:"2px dashed "+(showMileForm?"#3b82f6":"#1f2937"),background:showMileForm?"#060d1f":"transparent",color:showMileForm?"#60a5fa":"#4b5563",cursor:"pointer",fontSize:14,fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginBottom:14}}>
            <PlusIcon/>{showMileForm ? "Cancel" : "Log a Mile Run"}
          </button>
          {showMileForm && (
            <div style={{background:"#0a0f1a",borderRadius:16,padding:"18px",marginBottom:16,border:"1px solid #1e3a5f"}}>
              <div style={{display:"flex",flexDirection:"column",gap:12}}>
                <div><div style={{fontSize:10,color:"#374151",fontFamily:"monospace",marginBottom:5,textTransform:"uppercase",letterSpacing:2}}>Date</div><input type="date" value={mileInput.date} onChange={e => setMileInput(i=>({...i,date:e.target.value}))} style={inputStyle}/></div>
                <div><div style={{fontSize:10,color:"#374151",fontFamily:"monospace",marginBottom:5,textTransform:"uppercase",letterSpacing:2}}>Time (M:SS)</div><input type="text" placeholder="6:30" value={mileInput.time} onChange={e => setMileInput(i=>({...i,time:e.target.value}))} style={{...inputStyle,fontSize:28,fontWeight:800,letterSpacing:2}}/></div>
                <div><div style={{fontSize:10,color:"#374151",fontFamily:"monospace",marginBottom:5,textTransform:"uppercase",letterSpacing:2}}>Notes</div><input type="text" placeholder="Outside loop, felt strong..." value={mileInput.notes} onChange={e => setMileInput(i=>({...i,notes:e.target.value}))} style={{...inputStyle,fontFamily:"system-ui"}}/></div>
                <button onClick={addMile} style={{padding:"12px",borderRadius:11,border:"none",background:"#3b82f6",color:"#fff",cursor:"pointer",fontSize:14,fontWeight:700}}>Save Run</button>
              </div>
            </div>
          )}
          {mileLog.length >= 2 && (() => {
            const sorted = [...mileLog].sort((a,b) => a.date.localeCompare(b.date));
            const times = sorted.map(m => parseTime(m.time));
            const minT = Math.min(...times) - 20, maxT = Math.max(...times) + 20;
            const W = 340, H = 100;
            const pts = times.map((t,i) => ({ x: 20+(i/(times.length-1))*(W-40), y: H-14-((t-minT)/(maxT-minT))*(H-28) }));
            const pathD = pts.map((p,i) => (i===0?"M":"L")+p.x.toFixed(1)+","+p.y.toFixed(1)).join(" ");
            const areaD = pathD + " L"+pts[pts.length-1].x.toFixed(1)+","+(H-14)+" L"+pts[0].x.toFixed(1)+","+(H-14)+" Z";
            const goalY = H-14-((360-minT)/(maxT-minT))*(H-28);
            return (
              <div style={{background:"#0a0f1a",borderRadius:14,padding:"14px",marginBottom:14,border:"1px solid #1f2937"}}>
                <div style={{fontSize:10,letterSpacing:3,color:"#374151",fontFamily:"monospace",textTransform:"uppercase",marginBottom:8}}>Progress Chart</div>
                <svg viewBox={"0 0 "+W+" "+H} style={{width:"100%",height:100}}>
                  <defs>
                    <linearGradient id="milearea" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stopColor="#3b82f6" stopOpacity="0.2"/><stop offset="100%" stopColor="#3b82f6" stopOpacity="0.02"/></linearGradient>
                    <linearGradient id="mileline" x1="0" x2="1" y1="0" y2="0"><stop offset="0%" stopColor="#3b82f6"/><stop offset="100%" stopColor="#22c55e"/></linearGradient>
                  </defs>
                  {goalY > 4 && goalY < H && <g><line x1="20" y1={goalY} x2={W-20} y2={goalY} stroke="#ef444440" strokeWidth="1.5" strokeDasharray="4 3"/><text x={W-18} y={goalY-3} fill="#ef4444" fontSize="8" fontFamily="monospace" textAnchor="end">6:00</text></g>}
                  <path d={areaD} fill="url(#milearea)"/>
                  <path d={pathD} fill="none" stroke="url(#mileline)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
                  {pts.map((p,i) => (
                    <g key={i}>
                      <circle cx={p.x} cy={p.y} r="4" fill="#030712" stroke="url(#mileline)" strokeWidth="2"/>
                      <text x={p.x} y={H-1} fill="#374151" fontSize="7" fontFamily="monospace" textAnchor="middle">{sorted[i].date.slice(5)}</text>
                      <text x={p.x} y={p.y-7} fill="#93c5fd" fontSize="8" fontFamily="monospace" fontWeight="700" textAnchor="middle">{sorted[i].time}</text>
                    </g>
                  ))}
                </svg>
              </div>
            );
          })()}
          {mileLog.length === 0 ? (
            <div style={{textAlign:"center",padding:"48px 0"}}><div style={{fontSize:44,marginBottom:10}}>🏁</div><div style={{fontSize:14,color:"#374151"}}>No runs logged yet. Hit the road!</div></div>
          ) : (
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {[...mileLog].sort((a,b) => b.date.localeCompare(a.date)).map(m => {
                const secs = parseTime(m.time);
                const under6 = secs < 360;
                const diff = secs - 360;
                return (
                  <div key={m.id} style={{background:"#0a0f1a",borderRadius:13,padding:"13px 14px",border:"1px solid "+(under6?"#22c55e30":"#1f2937"),display:"flex",alignItems:"center",gap:12}}>
                    <div style={{minWidth:56,textAlign:"center"}}>
                      <div style={{fontSize:20,fontWeight:800,fontFamily:"monospace",color:under6?"#22c55e":diff<30?"#f59e0b":"#f9fafb"}}>{m.time}</div>
                      <div style={{fontSize:9,fontFamily:"monospace",color:under6?"#22c55e":diff<30?"#f59e0b":"#374151",marginTop:1}}>{under6?"SUB-6!":diff<30?"SO CLOSE":""}</div>
                    </div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:11,color:"#4b5563",fontFamily:"monospace"}}>{m.date}</div>
                      {m.notes && <div style={{fontSize:12,color:"#9ca3af",marginTop:2}}>{m.notes}</div>}
                    </div>
                    <button onClick={() => setMileLog(prev => prev.filter(x => x.id !== m.id))} style={{width:30,height:30,borderRadius:8,border:"1px solid #1f2937",background:"transparent",color:"#374151",cursor:"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>×</button>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}

      {/* EDIT TAB */}
      {tab === "edit" && (
        <EditTab program={program} onEditDay={(d) => setEditingDay(d)} />
      )}

      {/* Bottom nav */}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"#030712",borderTop:"1px solid #0f172a",display:"flex",zIndex:50}}>
        {TABS.map(([k,ic,l]) => (
          <button key={k} onClick={() => setTab(k)} style={{flex:1,padding:"10px 0 12px",border:"none",background:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,color:tab===k?"#22c55e":"#374151",transition:"color 0.2s"}}>
            <span style={{fontSize:18}}>{ic}</span>
            <span style={{fontSize:9,fontFamily:"monospace",letterSpacing:1,textTransform:"uppercase"}}>{l}</span>
          </button>
        ))}
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
